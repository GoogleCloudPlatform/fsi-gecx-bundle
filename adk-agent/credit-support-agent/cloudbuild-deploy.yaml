steps:
  - name: "ghcr.io/github-linguist/linguist:latest"
    id: "run-linguist"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        github-linguist /workspace --json > /workspace/linguist.json

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-version"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq jq
        LINGUIST_RESULT=$$(jq @json /workspace/linguist.json)
        
        VERSION_INPUT="0.0.0"
        IS_RELEASE="false"
        if [ -n "$TAG_NAME" ]; then
          CLEANED_TAG=$$(echo "$TAG_NAME" | sed 's/^v//')
          if echo "$$CLEANED_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$$'; then
            VERSION_INPUT="$$CLEANED_TAG"
            IS_RELEASE="true"
          else
            echo "Error: Tag '$TAG_NAME' is not in semver format (X.Y.Z or vX.Y.Z)." >&2
            exit 1
          fi
        fi
        
        bq query --use_legacy_sql=false --format=csv "CALL \`$PROJECT_ID.ci.get_build_version\`('credit-support-agent', 'ci', '$$VERSION_INPUT', 'fsi-gecx-bundle', '$COMMIT_SHA', $$IS_RELEASE, $$LINGUIST_RESULT)" > raw_output.txt
        cat raw_output.txt
        VERSION=$$(grep -o 'BUILD_VERSION=[0-9][0-9.]*' raw_output.txt | cut -d= -f2 | head -n 1 | tr -d '\r\n ')
        if [ -z "$$VERSION" ]; then
          echo "Error: Failed to retrieve build version from BigQuery." >&2
          exit 1
        fi
        echo "$$VERSION" > build_version.txt
        echo "Build Version is: $$VERSION"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "update-configs"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        VERSION=$$(cat build_version.txt)
        COMMIT_SHA="$SHORT_SHA"
        if [ -z "$$COMMIT_SHA" ]; then
          COMMIT_SHA="local"
        fi
        BUILD_TIME_MS=$$(date +%s000)
        echo "Updating pyproject.toml version to: $$VERSION"
        sed -i 's/^version = "[^"]*"/version = "'"$${VERSION}"'"/g' adk-agent/credit-support-agent/pyproject.toml
        cat adk-agent/credit-support-agent/pyproject.toml | grep "^version ="

        echo "Updating agent/version.py version: $$VERSION and commit: $$COMMIT_SHA and time: $$BUILD_TIME_MS"
        sed -i 's/BUILD_VERSION = "[^"]*"/BUILD_VERSION = "'"$${VERSION}"'"/g' adk-agent/credit-support-agent/agent/version.py
        sed -i 's/BUILD_COMMIT_ID = "[^"]*"/BUILD_COMMIT_ID = "'"$${COMMIT_SHA}"'"/g' adk-agent/credit-support-agent/agent/version.py
        sed -i 's/BUILD_TIME = "[^"]*"/BUILD_TIME = "'"$${BUILD_TIME_MS}"'"/g' adk-agent/credit-support-agent/agent/version.py
        cat adk-agent/credit-support-agent/agent/version.py | grep "BUILD_VERSION =\|BUILD_COMMIT_ID ="

  - name: "gcr.io/cloud-builders/docker"
    id: "pull-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:latest" || true

  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        TAGS="-t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:$${COMMIT_SHA:-local} -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:latest"
        if [ -n "$TAG_NAME" ]; then
          TAGS="$$TAGS -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:$TAG_NAME"
        fi
        DOCKER_BUILDKIT=1 docker build \
          --cache-from "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:latest" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -f adk-agent/credit-support-agent/Dockerfile \
          $$TAGS \
          .

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent",
        "--all-tags",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          gcloud run deploy credit-support-agent \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:$${COMMIT_SHA:-local}" \
            --region "${_REGION}" \
            --cpu "${_VOICE_AGENT_CPU}" \
            --memory "${_VOICE_AGENT_MEMORY}" \
            --timeout "${_VOICE_AGENT_REQUEST_TIMEOUT_SECONDS}s" \
            --min-instances "${_VOICE_AGENT_MIN_INSTANCES}" \
            --max-instances "${_VOICE_AGENT_MAX_INSTANCES}" \
            --concurrency "${_VOICE_AGENT_MAX_INSTANCE_REQUEST_CONCURRENCY}" \
            --update-env-vars "VOICE_AGENT_MAX_CONCURRENT_SESSIONS=${_VOICE_AGENT_MAX_CONCURRENT_SESSIONS},VOICE_AGENT_AUDIO_SESSION_CAPACITY_UNITS=${_VOICE_AGENT_AUDIO_SESSION_CAPACITY_UNITS},VOICE_AGENT_VIDEO_SESSION_CAPACITY_UNITS=${_VOICE_AGENT_VIDEO_SESSION_CAPACITY_UNITS}" \
            --no-cpu-throttling
        else
          echo "Skipping deployment because _TRIGGER_DEPLOY is not true"
        fi

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/credit-support-agent:latest"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _TRIGGER_DEPLOY: "false"
  _VOICE_AGENT_CPU: "4"
  _VOICE_AGENT_MEMORY: "4Gi"
  _VOICE_AGENT_REQUEST_TIMEOUT_SECONDS: "300"
  _VOICE_AGENT_MIN_INSTANCES: "1"
  _VOICE_AGENT_MAX_INSTANCES: "5"
  _VOICE_AGENT_MAX_INSTANCE_REQUEST_CONCURRENCY: "8"
  _VOICE_AGENT_MAX_CONCURRENT_SESSIONS: "4"
  _VOICE_AGENT_AUDIO_SESSION_CAPACITY_UNITS: "1"
  _VOICE_AGENT_VIDEO_SESSION_CAPACITY_UNITS: "4"
