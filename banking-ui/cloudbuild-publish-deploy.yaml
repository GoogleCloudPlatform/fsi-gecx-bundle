steps:
  - name: "ghcr.io/github/linguist"
    id: "run-linguist"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        github-linguist /workspace --json > /workspace/linguist.json

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-version"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        LINGUIST_RESULT=$$(jq @json /workspace/linguist.json)
        bq query --use_legacy_sql=false --format=csv "CALL \`$PROJECT_ID.ci.get_build_version\`('banking-ui', 'ci', '0.0.0', 'fsi-gecx-bundle', '$COMMIT_SHA', false, $$LINGUIST_RESULT)" > raw_output.txt
        cat raw_output.txt
        VERSION=$$(grep -o 'BUILD_VERSION=[0-9.]*' raw_output.txt | cut -d= -f2)
        if [ -z "$$VERSION" ]; then
          echo "Error: Failed to retrieve build version from BigQuery." >&2
          exit 1
        fi
        echo "$$VERSION" > build_version.txt
        echo "Build Version is: $$VERSION"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "update-configs"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        VERSION=$$(cat build_version.txt)
        COMMIT_SHA="$SHORT_SHA"
        if [ -z "$$COMMIT_SHA" ]; then
          COMMIT_SHA="local"
        fi
        echo "Updating config files with version: $$VERSION and commit: $$COMMIT_SHA"
        
        # Update config.js
        sed -i 's/BUILD_VERSION: "[^"]*"/BUILD_VERSION: "'"$${VERSION}"'"/g' banking-ui/public/config.js
        sed -i 's/BUILD_COMMIT_ID: "[^"]*"/BUILD_COMMIT_ID: "'"$${COMMIT_SHA}"'"/g' banking-ui/public/config.js
        
        # Update config.template.js
        sed -i 's/BUILD_VERSION: "[^"]*"/BUILD_VERSION: "'"$${VERSION}"'"/g' banking-ui/public/config.template.js
        sed -i 's/BUILD_COMMIT_ID: "[^"]*"/BUILD_COMMIT_ID: "'"$${COMMIT_SHA}"'"/g' banking-ui/public/config.template.js
        
        echo "--- Updated config.js ---"
        cat banking-ui/public/config.js
        echo "-------------------------"
        echo "--- Updated config.template.js ---"
        cat banking-ui/public/config.template.js
        echo "----------------------------------"

  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker build \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:$${COMMIT_SHA:-local}" \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:latest" \
          .
    dir: "banking-ui"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui",
        "--all-tags",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          gcloud run deploy banking-ui \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:$${COMMIT_SHA:-local}" \
            --region "${_REGION}"
        else
          echo "Skipping deployment because _TRIGGER_DEPLOY is not true"
        fi

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "trigger-crawl"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          echo "Sleeping for 60 seconds to allow the deployment to settle..."
          sleep 60
          echo "Triggering banking-ui-crawl trigger..."
          gcloud builds triggers run banking-ui-crawl --region="${_REGION}" --branch="${BRANCH_NAME}"
        else
          echo "Skipping trigger-crawl because _TRIGGER_DEPLOY is not true"
        fi

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:latest"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _TRIGGER_DEPLOY: "false"
