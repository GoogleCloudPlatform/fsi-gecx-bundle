steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "prepare-linguist-repository"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ ! -d /workspace/.git ]; then
          git init -q /workspace
          git -C /workspace add -A
          git -C /workspace \
            -c user.name=cloud-build -c user.email=cloud-build@localhost \
            commit -qm archive-build
        fi

  - name: "ghcr.io/github-linguist/linguist:latest"
    id: "run-linguist"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        github-linguist /workspace --json > /workspace/linguist.json

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-version"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq jq
        LINGUIST_RESULT=$$(jq @json /workspace/linguist.json)
        
        VERSION_INPUT="0.0.0"
        IS_RELEASE="false"
        if [ -n "$TAG_NAME" ]; then
          CLEANED_TAG=$$(echo "$TAG_NAME" | sed 's/^v//')
          if echo "$$CLEANED_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$$'; then
            VERSION_INPUT="$$CLEANED_TAG"
            IS_RELEASE="true"
          else
            echo "Error: Tag '$TAG_NAME' is not in semver format (X.Y.Z or vX.Y.Z)." >&2
            exit 1
          fi
        fi
        
        bq query --use_legacy_sql=false --format=csv "CALL \`$PROJECT_ID.ci.get_build_version\`('banking-ui', 'ci', '$$VERSION_INPUT', 'fsi-gecx-bundle', '$COMMIT_SHA', $$IS_RELEASE, $$LINGUIST_RESULT)" > raw_output.txt
        cat raw_output.txt
        VERSION=$$(grep -o 'BUILD_VERSION=[0-9][0-9.]*' raw_output.txt | cut -d= -f2 | head -n 1 | tr -d '\r\n ')
        if [ -z "$$VERSION" ]; then
          echo "Error: Failed to retrieve build version from BigQuery." >&2
          exit 1
        fi
        echo "$$VERSION" > build_version.txt
        echo "Build Version is: $$VERSION"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "update-configs"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        VERSION=$$(cat build_version.txt)
        COMMIT_SHA="$SHORT_SHA"
        if [ -z "$$COMMIT_SHA" ]; then
          COMMIT_SHA="local"
        fi
        BUILD_TIME_MS=$$(date +%s000)
        echo "Updating config files with version: $$VERSION and commit: $$COMMIT_SHA and time: $$BUILD_TIME_MS"

        # Update config.template.js
        sed -i 's/BUILD_VERSION: "[^"]*"/BUILD_VERSION: "'"$${VERSION}"'"/g' banking-ui/public/config.template.js
        sed -i 's/BUILD_COMMIT_ID: "[^"]*"/BUILD_COMMIT_ID: "'"$${COMMIT_SHA}"'"/g' banking-ui/public/config.template.js
        sed -i 's/BUILD_TIME: "[^"]*"/BUILD_TIME: "'"$${BUILD_TIME_MS}"'"/g' banking-ui/public/config.template.js
        sed -i 's/BUILD_PROJECT_ID: "[^"]*"/BUILD_PROJECT_ID: "'"$PROJECT_ID"'"/g' banking-ui/public/config.template.js
        sed -i 's/BUILD_BUILD_ID: "[^"]*"/BUILD_BUILD_ID: "'"$BUILD_ID"'"/g' banking-ui/public/config.template.js
        sed -i 's/BUILD_LOCATION: "[^"]*"/BUILD_LOCATION: "'"$LOCATION"'"/g' banking-ui/public/config.template.js

        # Determine boolean flag by checking if file exists and is not empty (-s)
        HAS_NOTES="false"
        if [ -s "banking-ui/public/release-notes.md" ]; then
          HAS_NOTES="true"
        else
          rm -f banking-ui/public/release-notes.md
        fi
        
        # Inject HAS_RELEASE_NOTES boolean
        sed -i 's/HAS_RELEASE_NOTES: "[^"]*"/HAS_RELEASE_NOTES: '"$$HAS_NOTES"'/g' banking-ui/public/config.template.js

        echo "--- Updated config.template.js ---"
        cat banking-ui/public/config.template.js
        echo "----------------------------------"

  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        TAGS="-t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:$${COMMIT_SHA:-local} -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:latest"
        if [ -n "$TAG_NAME" ]; then
          TAGS="$$TAGS -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:$TAG_NAME"
        fi
        docker build $$TAGS .
    dir: "banking-ui"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui",
        "--all-tags",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          gcloud run deploy banking-ui \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:$${COMMIT_SHA:-local}" \
            --region "${_REGION}"
        else
          echo "Skipping deployment because _TRIGGER_DEPLOY is not true"
        fi

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "trigger-crawl"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          echo "Sleeping for 60 seconds to allow the deployment to settle..."
          sleep 60
          echo "Triggering banking-ui-crawl trigger..."
          gcloud builds triggers run banking-ui-crawl --region="${_REGION}" --branch="${BRANCH_NAME}"
        else
          echo "Skipping trigger-crawl because _TRIGGER_DEPLOY is not true"
        fi

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-ui:latest"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _TRIGGER_DEPLOY: "false"
