steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-real-time-analytics-agent"
    entrypoint: "python3"
    args:
      - "deployment/data_agents/deploy_data_agent.py"
      - "--project=${PROJECT_ID}"
      - "--spec=deployment/data_agents/real_time_analytics_agent.json"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
