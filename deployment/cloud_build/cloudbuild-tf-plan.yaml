steps:
  - name: "hashicorp/terraform:1.15.7"
    id: "tf-init"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        terraform init -backend-config=./environment/${PROJECT_ID}/gcs.tfbackend
    dir: "deployment/terraform"

  - name: "hashicorp/terraform:1.15.7"
    id: "tf-plan"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        terraform plan -var-file=./environment/${PROJECT_ID}/terraform.tfvars
    dir: "deployment/terraform"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
