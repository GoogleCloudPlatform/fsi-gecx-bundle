steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "install-terraform"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        curl -sSL https://releases.hashicorp.com/terraform/1.15.7/terraform_1.15.7_linux_amd64.zip -o /workspace/terraform.zip
        apt-get update -qq && apt-get install -y -qq unzip
        unzip -o -q /workspace/terraform.zip -d /workspace
        rm /workspace/terraform.zip

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "tf-init"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        /workspace/terraform init -backend-config=./environment/${PROJECT_ID}/gcs.tfbackend
    dir: "deployment/terraform"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "tf-plan"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        /workspace/terraform plan -var-file=./environment/${PROJECT_ID}/terraform.tfvars
    dir: "deployment/terraform"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
