name: de51bcc7-fb3b-4a40-9b97-f52bcb0a0622
displayName: Credit_Support_Voice_Agent
rootAgent: Credit Card Support Agent
loggingSettings:
  conversationLoggingSettings:
    retentionWindow: 31536000s
  redactionConfig:
    enableRedaction: true
audioProcessingConfig:
  inactivityTimeout: 300s
guardrails:
- Default Safety Guardrail
- Default Prompt Guardrail
variableDeclarations:
- name: user_id
  description: Variable "user_id".
  schema:
    type: STRING
- name: session_capability
  description: Opaque, short-lived banking authority for this CES session.
  schema:
    type: STRING
- name: support_session_id
  description: Server-issued support session identifier.
  schema:
    type: STRING
- name: runtime_name
  description: Trusted conversational runtime name.
  schema:
    type: STRING
- name: runtime_session_id
  description: Server-issued CES runtime session identifier.
  schema:
    type: STRING
- name: customer_ref
  description: One-way customer reference for safe correlation.
  schema:
    type: STRING
- name: reset_generation
  description: Banking voice reset-generation token.
  schema:
    type: STRING
- name: catalog_snapshot_id
  description: Knowledge Catalog guidance snapshot identifier.
  schema:
    type: STRING
- name: catalog_content_version
  description: Knowledge Catalog guidance content version.
  schema:
    type: STRING
- name: entry_reason
  description: Bounded voice-support entry reason.
  schema:
    type: STRING
- name: has_active_fraud_alert
  description: Whether banking reports an active fraud alert at session start.
  schema:
    type: BOOLEAN
- name: fraud_support_guidance_summary
  description: Bounded, catalog-grounded support guidance for this session.
  schema:
    type: STRING
- name: ces_app_id
  description: CES application identifier used by this session.
  schema:
    type: STRING
- name: ces_version_or_deployment_id
  description: CES version or deployment identifier used by this session.
  schema:
    type: STRING
- name: language_code
  description: Product language code, initially English.
  schema:
    type: STRING
- name: runtime_language_code
  description: Provider-specific spoken-language locale.
  schema:
    type: STRING
- name: language_selection_source
  description: Source of the active language selection.
  schema:
    type: STRING
- name: customer_turn_id
  description: CES callback-owned identifier for the current completed customer turn.
  schema:
    type: STRING
- name: proposal_id
  description: Opaque active proposal identifier captured from the banking tool response.
  schema:
    type: STRING
- name: proposal_customer_safe_summary
  description: Banking-authored summary that must be presented before confirmation.
  schema:
    type: STRING
- name: proposal_originating_turn_id
  description: CES callback-owned customer turn that originated the proposal.
  schema:
    type: STRING
- name: proposal_presentation_turn_id
  description: CES callback-owned turn in which the banking summary was presented.
  schema:
    type: STRING
- name: proposal_confirmation_turn_id
  description: CES callback-owned later customer confirmation turn.
  schema:
    type: STRING
- name: proposal_confirmation_method
  description: CES callback-owned normalized confirmation method.
  schema:
    type: STRING
- name: proposal_confirmation_classification
  description: CES callback-owned CONFIRMED, DECLINED, or UNCLEAR classification.
  schema:
    type: STRING
- name: proposal_last_classified_turn_id
  description: CES callback-owned guard against reclassifying one invocation.
  schema:
    type: STRING
- name: active_fraud_alert_id
  description: Banking-owned active fraud alert captured from the read tool.
  schema:
    type: STRING
- name: active_fraud_authorization_ids
  description: Comma-delimited pending authorization ids captured from the active alert.
  schema:
    type: STRING
- name: active_fraud_transaction_ids
  description: Comma-delimited posted transaction ids captured from the active alert.
  schema:
    type: STRING
- name: fraud_selection_prompt_turn_id
  description: CES callback-owned turn that asked the customer to classify the flagged activity.
  schema:
    type: STRING
- name: fraud_selection_pending
  description: Whether the next customer turn is answering the flagged-activity recognition question.
  schema:
    type: BOOLEAN
timeZoneSettings:
  timeZone: America/Los_Angeles
