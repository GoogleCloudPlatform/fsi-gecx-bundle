steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "pull-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest" || true

  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        DOCKER_BUILDKIT=1 docker build \
          --cache-from "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest" \
          .
    dir: "banking-service"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service",
        "--all-tags",
      ]

  # - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
  #   id: "run-db-migration-job"
  #   entrypoint: "bash"
  #   args:
  #     - "-c"
  #     - |
  #       if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
  #         echo "Triggering database migrations trigger (banking-db-migration)..."
  #         BUILD_ID=$(gcloud builds triggers run banking-db-migration \
  #           --region="${_REGION}" \
  #           --branch="$BRANCH_NAME" \
  #           --format="value(metadata.build.id)")
          
  #         echo "Waiting for migration build $$BUILD_ID to complete..."
  #         gcloud builds log "$$BUILD_ID" --region="${_REGION}" --stream
  #       else
  #         echo "Skipping migrations because _TRIGGER_DEPLOY is not true"
  #       fi

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-db-migration-job"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          echo "Registering latest image with Cloud Run Migration Job..."
          gcloud run jobs update banking-db-migrate \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
            --update-env-vars "^|^IAM_DBA_USERS=${_IAM_DBA_USERS}" \
            --region "${_REGION}"
          echo "Executing pre-deployment database schema migrations..."
          gcloud run jobs execute banking-db-migrate \
            --region "${_REGION}" \
            --wait
        else
          echo "Skipping migrations because _TRIGGER_DEPLOY is not true"
        fi

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-service"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          echo "Deploying application to Cloud Run Service..."
          gcloud run deploy banking-service \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
            --region "${_REGION}"
        else
          echo "Skipping deployment because _TRIGGER_DEPLOY is not true"
        fi

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest"

options:
  pool:
    name: "projects/${PROJECT_ID}/locations/${_REGION}/workerPools/build-pool"
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _TRIGGER_DEPLOY: "false"
  _IAM_DBA_USERS: ""

