steps:
  - name: "ghcr.io/github-linguist/linguist:latest"
    id: "run-linguist"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        github-linguist /workspace --json > /workspace/linguist.json

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-version"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq jq
        LINGUIST_RESULT=$$(jq @json /workspace/linguist.json)
        
        VERSION_INPUT="0.0.0"
        IS_RELEASE="false"
        if [ -n "$TAG_NAME" ]; then
          CLEANED_TAG=$$(echo "$TAG_NAME" | sed 's/^v//')
          if echo "$$CLEANED_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$$'; then
            VERSION_INPUT="$$CLEANED_TAG"
            IS_RELEASE="true"
          else
            echo "Error: Tag '$TAG_NAME' is not in semver format (X.Y.Z or vX.Y.Z)." >&2
            exit 1
          fi
        fi
        
        bq query --use_legacy_sql=false --format=csv "CALL \`$PROJECT_ID.ci.get_build_version\`('banking-service', 'ci', '$$VERSION_INPUT', 'fsi-gecx-bundle', '$COMMIT_SHA', $$IS_RELEASE, $$LINGUIST_RESULT)" > raw_output.txt
        cat raw_output.txt
        VERSION=$$(grep -o 'BUILD_VERSION=[0-9][0-9.]*' raw_output.txt | cut -d= -f2 | head -n 1 | tr -d '\r\n ')
        if [ -z "$$VERSION" ]; then
          echo "Error: Failed to retrieve build version from BigQuery." >&2
          exit 1
        fi
        echo "$$VERSION" > build_version.txt
        echo "Build Version is: $$VERSION"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "update-configs"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        VERSION=$$(cat build_version.txt)
        COMMIT_SHA="$SHORT_SHA"
        if [ -z "$$COMMIT_SHA" ]; then
          COMMIT_SHA="local"
        fi
        echo "Updating pyproject.toml version to: $$VERSION"
        sed -i 's/^version = "[^"]*"/version = "'"$${VERSION}"'"/g' banking-service/pyproject.toml
        cat banking-service/pyproject.toml | grep "^version ="

        echo "Updating utils/version.py version: $$VERSION and commit: $$COMMIT_SHA"
        sed -i 's/BUILD_VERSION = "[^"]*"/BUILD_VERSION = "'"$${VERSION}"'"/g' banking-service/utils/version.py
        sed -i 's/BUILD_COMMIT_ID = "[^"]*"/BUILD_COMMIT_ID = "'"$${COMMIT_SHA}"'"/g' banking-service/utils/version.py
        cat banking-service/utils/version.py | grep "BUILD_VERSION =\|BUILD_COMMIT_ID ="

  - name: "gcr.io/cloud-builders/docker"
    id: "pull-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest" || true

  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        TAGS="-t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local} -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest"
        if [ -n "$TAG_NAME" ]; then
          TAGS="$$TAGS -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$TAG_NAME"
        fi
        DOCKER_BUILDKIT=1 docker build \
          --cache-from "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          $$TAGS \
          .
    dir: "banking-service"

  - name: "gcr.io/cloud-builders/docker"
    id: "validate-ephemeral-migrations"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "Starting ephemeral PostgreSQL container for migration validation..."
        docker rm -f pg-validate || true
        docker run --name pg-validate -e POSTGRES_PASSWORD=secret -e POSTGRES_DB=banking -d mirror.gcr.io/library/postgres:16-alpine
        trap "docker rm -f pg-validate || true" EXIT
        echo "Waiting for PostgreSQL container to accept connections..."
        until docker exec pg-validate pg_isready -U postgres; do sleep 1; done
        echo "Executing Alembic upgrade head, downgrade base, and upgrade head against PostgreSQL..."
        docker run --rm --network container:pg-validate -e SKIP_IAM_GRANTS=true -e DATABASE_URL="postgresql://postgres:secret@127.0.0.1:5432/banking" \
          "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
          bash -c "alembic upgrade head && alembic downgrade base && alembic upgrade head"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service",
        "--all-tags",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-db-migration-job"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          echo "Registering latest image with Cloud Run Migration Job..."
          gcloud run jobs update banking-db-migrate \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
            --command "alembic" \
            --args "upgrade,head" \
            --update-env-vars "^|^IAM_DBA_USERS=${_IAM_DBA_USERS}|IAM_DB_VIEWER_USERS=${_IAM_DB_VIEWER_USERS}|REQUIRE_CDC_BOOTSTRAP=true" \
            --region "${_REGION}"
          echo "Executing pre-deployment database schema migrations..."
          gcloud run jobs execute banking-db-migrate \
            --region "${_REGION}" \
            --wait
          if gcloud datastream streams describe banking-cdc-stream --location "${_REGION}" >/dev/null 2>&1; then
            echo "Starting Datastream CDC stream after successful migrations..."
            gcloud datastream streams update banking-cdc-stream \
              --location "${_REGION}" \
              --state=RUNNING \
              --update-mask=state
          else
            echo "Datastream stream banking-cdc-stream not found; skipping CDC bootstrap."
          fi
          if gcloud run jobs describe lakehouse-view-reconcile --region "${_REGION}" >/dev/null 2>&1; then
            echo "Starting non-blocking lakehouse view reconciliation..."
            gcloud run jobs execute lakehouse-view-reconcile \
              --region "${_REGION}" \
              --async || echo "Lakehouse reconcile job did not start; continuing deployment."
          else
            echo "Lakehouse reconcile job not found; skipping non-blocking view reconciliation."
          fi
          if gcloud run jobs describe banking-knowledge-catalog-sync --region "${_REGION}" >/dev/null 2>&1; then
            echo "Registering latest image with Knowledge Catalog sync job..."
            gcloud run jobs update banking-knowledge-catalog-sync \
              --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
              --command "python" \
              --args "scripts/sync_fraud_support_guidance.py" \
              --region "${_REGION}"
            echo "Syncing fraud support guidance into Dataplex Knowledge Catalog..."
            gcloud run jobs execute banking-knowledge-catalog-sync \
              --region "${_REGION}" \
              --wait
          else
            echo "Knowledge Catalog sync job not found; skipping guidance sync."
          fi
        else
          echo "Skipping migrations because _TRIGGER_DEPLOY is not true"
        fi

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-service"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_TRIGGER_DEPLOY}" = "true" ]; then
          echo "Deploying application to Cloud Run Service..."
          gcloud run deploy banking-service \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:$${COMMIT_SHA:-local}" \
            --region "${_REGION}"
        else
          echo "Skipping deployment because _TRIGGER_DEPLOY is not true"
        fi

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/fsi-gecx-bundle/banking-service:latest"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _TRIGGER_DEPLOY: "false"
  _IAM_DBA_USERS: ""
  _IAM_DB_VIEWER_USERS: ""
