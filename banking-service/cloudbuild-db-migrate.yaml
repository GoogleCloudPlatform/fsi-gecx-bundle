steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-db-migration-job"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "Executing ordered database bootstrap, migration, and reconciliation..."
        gcloud run jobs execute banking-db-bootstrap \
          --region "${_REGION}" \
          --wait
        gcloud run jobs execute banking-db-migrate \
          --region "${_REGION}" \
          --wait
        gcloud run jobs execute banking-db-reconcile \
          --region "${_REGION}" \
          --wait
        if gcloud datastream streams describe banking-cdc-stream --location "${_REGION}" >/dev/null 2>&1; then
          echo "Starting Datastream CDC stream after successful migrations..."
          gcloud datastream streams update banking-cdc-stream \
            --location "${_REGION}" \
            --state=RUNNING \
            --update-mask=state
        else
          echo "Datastream stream banking-cdc-stream not found; skipping CDC bootstrap."
        fi
        if gcloud run jobs describe lakehouse-view-reconcile --region "${_REGION}" >/dev/null 2>&1; then
          echo "Starting non-blocking lakehouse view reconciliation..."
          gcloud run jobs execute lakehouse-view-reconcile \
            --region "${_REGION}" \
            --async || echo "Lakehouse reconcile job did not start; migration build remains successful."
        else
          echo "Lakehouse reconcile job not found; skipping non-blocking view reconciliation."
        fi

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
